<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="user-info">
        <div id="username"></div>
        <div id="balance"></div>
    </div>
    <div class="container">
        <div class="exit-button-container" id="exitButton1Container">
            <img src="images/exit.png" alt="Выйти" class="exit-button-image">
            <div class="exit-button-label">Слот-барабан</div>
        </div>
        <div class="exit-button-container" id="exitButton2Container">
            <img src="images/exit2.png" alt="Выйти" class="exit-button-image">
            <div class="exit-button-label">Рулетка</div>
        </div>
        <div class="exit-button-container" id="exitButton3Container">
            <img src="images/exit3.png" alt="Выйти" class="exit-button-image">
            <div class="exit-button-label">Авиатор</div>
        </div>
        <button class="exit-button" id="exitButton4">Выйти</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
