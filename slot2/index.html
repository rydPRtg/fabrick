<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sloty</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>
<body>

<div class="user-info">
    <div id="username" class="user-info-item"></div>
    <div id="balance" class="user-info-item"></div>
</div>

<div id="container">
    <div class="window-border">
        <div class="window">
            <div class="outer-spacer"></div>
            <div class="outer-col">
                <div class="col"></div>
            </div>
            <div class="outer-spacer"></div>
            <div class="outer-col">
                <div class="col"></div>
            </div>
            <div class="outer-spacer"></div>
            <div class="outer-col">
                <div class="col"></div>
            </div>
            <div class="outer-spacer"></div>
        </div>
    </div>

    <div class="controls">
        <div class="bet-controls">
            <input type="number" id="bet-amount" placeholder="Сумма ставки">
            <div class="quick-bet-buttons">
                <button onclick="quickBet(1)">1$</button>
                <button onclick="quickBet(5)">5$</button>
                <button onclick="quickBet(10)">10$</button>
            </div>
        </div>
        <input type="button" onclick="spin(this)" class="start-button" value="Spin"/>
    </div>
</div>

</body>
</html>
