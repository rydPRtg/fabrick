<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="profile-header">
        Профиль игрока
    </div>
    <div class="user-info">
        <div id="username"></div>
        <div id="balance"></div>
    </div>
    <div class="conversion-info">
        1 TFS = 2 Stars
    </div>
    <div class="buttons">
        <button class="action-button" id="depositButton">Пополнить баланс</button>
        <button class="action-button" id="withdrawButton">Вывод</button>
    </div>

    <!-- Модальное окно для ввода суммы -->
    <div id="depositModal" class="modal">
        <div class="modal-content">
            <span class="close-button">×</span>
            <h2>Пополнение баланса</h2>
            <input type="number" id="depositAmount" placeholder="Введите сумму (TFS)" min="1">
            <button class="action-button" id="payWithStars">Оплатить через Telegram Stars</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Проверка инициализации Telegram WebApp
        if (!window.Telegram?.WebApp) {
            alert('Пожалуйста, откройте это приложение через Telegram');
        } else {
            window.Telegram.WebApp.ready();
        }
    </script>
</body>
</html>
