<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div id="game-area">
            <div id="plane-container">
                <div id="plane" class="plane"></div>
            </div>
            <div id="trail" class="trail"></div>
            <div id="multiplier" class="multiplier">1.00x</div>
        </div>
        <div class="controls">
            <div class="bet-input">
                <label for="bet-amount">Bet Amount:</label>
                <input type="number" id="bet-amount" value="1.00">
            </div>
            <button id="place-bet">Place Bet</button>
            <button id="cash-out" disabled>Cash Out</button>
            <button id="exit-button">Exit</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
